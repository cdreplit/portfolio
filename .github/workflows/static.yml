name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # We use "npm install" which creates a lockfile if missing
      # The "|| true" ensures that if there is no package.json, the script doesn't crash
      - name: Install and Build
        run: |
          if [ -f package.json ]; then
            npm install
            if grep -q "build" package.json; then
              npm run build
            fi
          else
            echo "No package.json found, skipping build step."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This uploads the whole folder. 
          # If your build creates a 'dist' folder, change '.' to './dist'
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
