name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Use Node.js 24
    uses: actions/setup-node@v4
    with:
      # You can specify '24', '24.x', or 'lts/krypton'
      node-version: '24'
      cache: 'npm' # Recommended: stays efficient by caching dependencies

  - run: npm ci
  - run: npm test
